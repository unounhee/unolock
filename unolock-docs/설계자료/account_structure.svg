<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1480" viewBox="0 0 1100 1480" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2E75B6"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#B68A2E"/>
    </marker>
  </defs>

  <rect width="1100" height="1480" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="46" text-anchor="middle" font-size="28" font-weight="700" fill="#1a1a1a">UnoLock 계정 구조 &amp; 가입 흐름</text>
  <line x1="80" y1="64" x2="1020" y2="64" stroke="#2E75B6" stroke-width="3"/>

  <!-- ============ PART 1: 가입 흐름 ============ -->
  <text x="80" y="108" font-size="20" font-weight="700" fill="#2E75B6">PART 1 ·  가입 흐름 (학원 먼저, 학생·학부모는 검색 등록)</text>

  <!-- Step 1: 학원 가입 -->
  <rect x="80" y="130" width="300" height="92" rx="12" fill="#D5E8F0" stroke="#2E75B6" stroke-width="2"/>
  <text x="230" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#1a4566">① 학원 / 과외선생 가입</text>
  <text x="230" y="184" text-anchor="middle" font-size="13" fill="#33536b">먼저 가입하여 "공간"을 만든다</text>
  <text x="230" y="204" text-anchor="middle" font-size="12" fill="#5a7488">반 개설 · 미션 정책 설정</text>

  <!-- arrow down -->
  <line x1="230" y1="222" x2="230" y2="258" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 학원 공간 생성 -->
  <rect x="80" y="260" width="300" height="74" rx="12" fill="#fff" stroke="#2E75B6" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="230" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#1a4566">🏫 학원 공간 생성 완료</text>
  <text x="230" y="312" text-anchor="middle" font-size="12" fill="#5a7488">→ 이제 검색 가능한 상태가 됨</text>

  <!-- Step 2: 학생/학부모 가입 -->
  <rect x="470" y="130" width="270" height="92" rx="12" fill="#E8F0D5" stroke="#70A02E" stroke-width="2"/>
  <text x="605" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#3d5618">② 학생 가입</text>
  <text x="605" y="188" text-anchor="middle" font-size="12" fill="#5a7035">학원 검색 → 등록 신청</text>
  <text x="605" y="208" text-anchor="middle" font-size="12" fill="#5a7035">(소속 학원이 없으면 대기)</text>

  <rect x="470" y="240" width="270" height="92" rx="12" fill="#F0E8D5" stroke="#B68A2E" stroke-width="2"/>
  <text x="605" y="272" text-anchor="middle" font-size="15" font-weight="700" fill="#6b5118">③ 학부모 가입</text>
  <text x="605" y="298" text-anchor="middle" font-size="12" fill="#7a6035">학원 검색 → 자녀 연결 신청</text>
  <text x="605" y="318" text-anchor="middle" font-size="12" fill="#7a6035">(직접 관리 시 → 직접학부모)</text>

  <!-- dashed provide arrows from 학원공간 -->
  <path d="M380 288 Q425 235 468 185" fill="none" stroke="#2E75B6" stroke-width="1.6" stroke-dasharray="4,4" marker-end="url(#arrowBlue)"/>
  <path d="M380 296 Q425 295 468 286" fill="none" stroke="#2E75B6" stroke-width="1.6" stroke-dasharray="4,4" marker-end="url(#arrowBlue)"/>
  <text x="396" y="232" font-size="11" fill="#2E75B6" font-style="italic">검색 노출</text>

  <!-- Step 3: 승인 -->
  <line x1="740" y1="176" x2="800" y2="176" stroke="#555" stroke-width="2"/>
  <line x1="740" y1="286" x2="770" y2="286" stroke="#555" stroke-width="2"/>
  <path d="M770 286 Q800 286 800 230 L800 188" fill="none" stroke="#555" stroke-width="2"/>
  <line x1="800" y1="230" x2="800" y2="176" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="800" y="150" width="220" height="92" rx="12" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="910" y="182" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">④ 학원이 승인</text>
  <text x="910" y="208" text-anchor="middle" font-size="12" fill="#444">출제자-학생-학부모</text>
  <text x="910" y="226" text-anchor="middle" font-size="12" fill="#444">연결 완료 ✓</text>

  <!-- note about 직접학부모 -->
  <rect x="470" y="356" width="550" height="58" rx="10" fill="#F0D5E8" stroke="#B62E8A" stroke-width="1.6"/>
  <text x="490" y="380" font-size="13" font-weight="700" fill="#7a1c5a">직접학부모 케이스</text>
  <text x="490" y="402" font-size="12" fill="#7a3060">학원 없이 학부모가 직접 출제자 역할까지 겸함 → 학부모-학생만 연결 (저학년 타겟)</text>

  <!-- divider -->
  <line x1="80" y1="450" x2="1020" y2="450" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- ============ PART 2: 권한 연결 ============ -->
  <text x="80" y="492" font-size="20" font-weight="700" fill="#2E75B6">PART 2 ·  연결 후 권한 구조 (학생을 중심으로 3종 권한 분리)</text>

  <!-- 학생 중심 노드 -->
  <rect x="430" y="760" width="240" height="110" rx="16" fill="#E8F0D5" stroke="#70A02E" stroke-width="3"/>
  <text x="550" y="800" text-anchor="middle" font-size="18" font-weight="700" fill="#3d5618">학생</text>
  <text x="550" y="826" text-anchor="middle" font-size="13" fill="#5a7035">하나의 학생 계정</text>
  <text x="550" y="848" text-anchor="middle" font-size="12" fill="#7a8c5a">(모든 권한이 향하는 중심)</text>

  <!-- 출제자 노드 -->
  <rect x="120" y="560" width="300" height="120" rx="14" fill="#D5E8F0" stroke="#2E75B6" stroke-width="2.5"/>
  <text x="270" y="595" text-anchor="middle" font-size="17" font-weight="700" fill="#1a4566">출제자</text>
  <text x="270" y="618" text-anchor="middle" font-size="12" fill="#33536b">학원 / 과외선생 / 직접학부모</text>
  <line x1="150" y1="632" x2="390" y2="632" stroke="#2E75B6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="270" y="652" text-anchor="middle" font-size="12" font-weight="600" fill="#1a4566">▸ 출제 권한 (교재·미션)</text>
  <text x="270" y="670" text-anchor="middle" font-size="12" font-weight="600" fill="#1a4566">▸ 열람 권한 — 전체 데이터</text>

  <!-- 학부모 노드 -->
  <rect x="680" y="560" width="300" height="120" rx="14" fill="#F0E8D5" stroke="#B68A2E" stroke-width="2.5"/>
  <text x="830" y="595" text-anchor="middle" font-size="17" font-weight="700" fill="#6b5118">학부모</text>
  <text x="830" y="618" text-anchor="middle" font-size="12" fill="#7a6035">(시간·정보의 일부 권한)</text>
  <line x1="710" y1="632" x2="950" y2="632" stroke="#B68A2E" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="830" y="652" text-anchor="middle" font-size="12" font-weight="600" fill="#6b5118">▸ 시간관리 권한 (보상시간)</text>
  <text x="830" y="670" text-anchor="middle" font-size="12" font-weight="600" fill="#6b5118">▸ 열람 권한 — 결과만</text>

  <!-- 출제자 -> 학생 -->
  <path d="M300 680 Q360 740 445 778" fill="none" stroke="#2E75B6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="318" y="730" font-size="12" fill="#2E75B6" font-weight="600">전체를 본다</text>

  <!-- 학부모 -> 학생 -->
  <path d="M800 680 Q740 740 655 778" fill="none" stroke="#B68A2E" stroke-width="2.5" marker-end="url(#arrowGold)"/>
  <text x="700" y="730" font-size="12" fill="#B68A2E" font-weight="600">성공만 본다</text>

  <!-- 출제자 -> 학부모 (주간 피드백) -->
  <path d="M420 600 Q550 540 678 600" fill="none" stroke="#999" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="550" y="540" text-anchor="middle" font-size="12" fill="#777" font-style="italic">주간 피드백 발송</text>

  <!-- 정보 비대칭 강조 박스 -->
  <rect x="120" y="930" width="860" height="120" rx="14" fill="#fafafa" stroke="#ccc" stroke-width="1.5"/>
  <text x="550" y="962" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">⚖️  핵심 — 열람 권한의 "범위 분리" = 정보 비대칭</text>
  <line x1="550" y1="978" x2="550" y2="1035" stroke="#ddd" stroke-width="1.5"/>
  <text x="160" y="1000" font-size="13" font-weight="700" fill="#1a4566">교사가 보는 것</text>
  <text x="160" y="1022" font-size="12" fill="#444">틀린 횟수 · 재시험 횟수 · 취약 영역 · 모든 과정</text>
  <text x="600" y="1000" font-size="13" font-weight="700" fill="#6b5118">학부모가 보는 것</text>
  <text x="600" y="1022" font-size="12" fill="#444">"통과했어요!" 결과 + 주간 리포트 (과정은 가림)</text>

  <!-- divider -->
  <line x1="80" y1="1085" x2="1020" y2="1085" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- ============ PART 3: 설계 시 핵심 질문 (해결됨) ============ -->
  <text x="80" y="1126" font-size="20" font-weight="700" fill="#2E75B6">PART 3 ·  계정 설계의 핵심 질문 — 모두 결정 완료 ✓</text>

  <rect x="80" y="1148" width="450" height="74" rx="10" fill="#E8F5E9" stroke="#2EB652" stroke-width="1.6"/>
  <text x="100" y="1174" font-size="13" font-weight="700" fill="#1a6b32">Q1. 자녀 증명  ✓</text>
  <text x="100" y="1196" font-size="12" fill="#2a5a3a">학생 등록 시 학부모 번호 입력 → 코드 발송</text>
  <text x="100" y="1214" font-size="12" fill="#2a5a3a">→ 학부모 가입 때 코드 확인 (초기 SMS, 추후 알림톡)</text>

  <rect x="570" y="1148" width="450" height="74" rx="10" fill="#E8F5E9" stroke="#2EB652" stroke-width="1.6"/>
  <text x="590" y="1174" font-size="13" font-weight="700" fill="#1a6b32">Q2. 한 학생 ↔ 두 보호자  ✓</text>
  <text x="590" y="1196" font-size="12" fill="#2a5a3a">학원·학부모가 같은 학생을 동시에 연결</text>
  <text x="590" y="1214" font-size="12" fill="#2a5a3a">(열람 범위는 분리 = 정보 비대칭)</text>

  <rect x="80" y="1234" width="450" height="74" rx="10" fill="#E8F5E9" stroke="#2EB652" stroke-width="1.6"/>
  <text x="100" y="1260" font-size="13" font-weight="700" fill="#1a6b32">Q3. 학원 이동  ✓</text>
  <text x="100" y="1282" font-size="12" fill="#2a5a3a">학원이 인당 구독 끊음 (돈 흐름 = 자동 정리)</text>
  <text x="100" y="1300" font-size="12" fill="#2a5a3a">→ 데이터 3개월 보관 후 삭제</text>

  <rect x="570" y="1234" width="450" height="74" rx="10" fill="#E8F5E9" stroke="#2EB652" stroke-width="1.6"/>
  <text x="590" y="1260" font-size="13" font-weight="700" fill="#1a6b32">Q4. 직접학부모 전환  ✓</text>
  <text x="590" y="1282" font-size="12" fill="#2a5a3a">구독 종료 시 자동 카톡 발송</text>
  <text x="590" y="1300" font-size="12" fill="#2a5a3a">→ 학부모가 직접 관리로 전환 (이탈→B2C 전환)</text>

  <!-- footer -->
  <line x1="80" y1="1346" x2="1020" y2="1346" stroke="#2E75B6" stroke-width="2"/>
  <text x="550" y="1378" text-anchor="middle" font-size="14" font-weight="700" fill="#2E75B6">계정 구조 4대 질문 전부 결정 완료 — "설계도 먼저" 철학의 가장 핵심 기초공사가 끝났다</text>
  <text x="550" y="1402" text-anchor="middle" font-size="12" fill="#888">UnoLock (가칭) · 계정 연결 구조 다이어그램 v2 (결정 반영)</text>
</svg>
