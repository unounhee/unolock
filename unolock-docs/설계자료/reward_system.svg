<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="1180" viewBox="0 0 1160 1180" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#70A02E"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#2E75B6"/></marker>
    <marker id="d" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#999"/></marker>
  </defs>
  <rect width="1160" height="1180" fill="#ffffff"/>

  <text x="580" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#1a1a1a">UnoLock 보상 체계 설계</text>
  <text x="580" y="74" text-anchor="middle" font-size="14" fill="#888">2단계 보상 + 저축 가능한 휴식 지갑 · v1</text>
  <line x1="70" y1="88" x2="1090" y2="88" stroke="#2E75B6" stroke-width="3"/>

  <!-- 핵심 원칙 배너 -->
  <rect x="70" y="106" width="1020" height="56" rx="12" fill="#F3F1FE" stroke="#6c5ce7" stroke-width="1.5"/>
  <text x="580" y="130" text-anchor="middle" font-size="15" font-weight="800" fill="#4b3bbd">핵심 원칙 — "자잘한 보상은 미끼, 진짜 보상은 전부 끝냈을 때"</text>
  <text x="580" y="150" text-anchor="middle" font-size="12.5" fill="#6a5fc0">아이가 "지금 쉴까 / 참고 끝까지 갈까"를 스스로 선택 → 만족 지연·자기조절 능력을 훈련</text>

  <!-- 여러 학원 과제 모임 -->
  <text x="70" y="200" font-size="17" font-weight="700" fill="#555">① 여러 학원의 과제가 "오늘의 미션" 하나로 모임</text>

  <g font-size="12">
    <rect x="70" y="216" width="150" height="56" rx="10" fill="#D5E8F0" stroke="#2E75B6" stroke-width="1.6"/>
    <text x="145" y="240" text-anchor="middle" font-weight="700" fill="#1a4566">수학학원</text>
    <text x="145" y="258" text-anchor="middle" fill="#5a7488">과제 2개</text>

    <rect x="70" y="284" width="150" height="56" rx="10" fill="#D5E8F0" stroke="#2E75B6" stroke-width="1.6"/>
    <text x="145" y="308" text-anchor="middle" font-weight="700" fill="#1a4566">영어학원</text>
    <text x="145" y="326" text-anchor="middle" fill="#5a7488">과제 2개</text>

    <rect x="70" y="352" width="150" height="56" rx="10" fill="#F0D5E8" stroke="#B62E8A" stroke-width="1.6"/>
    <text x="145" y="376" text-anchor="middle" font-weight="700" fill="#7a1c5a">직접학부모</text>
    <text x="145" y="394" text-anchor="middle" fill="#9a4078">과제 1개</text>
  </g>

  <path d="M220 244 Q300 244 340 300" fill="none" stroke="#999" stroke-width="1.6" marker-end="url(#d)"/>
  <path d="M220 312 L338 312" fill="none" stroke="#999" stroke-width="1.6" marker-end="url(#d)"/>
  <path d="M220 380 Q300 380 340 324" fill="none" stroke="#999" stroke-width="1.6" marker-end="url(#d)"/>

  <rect x="345" y="262" width="190" height="100" rx="14" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="440" y="292" text-anchor="middle" font-size="14" font-weight="800" fill="#1a1a1a">📋 오늘의 미션</text>
  <text x="440" y="316" text-anchor="middle" font-size="12.5" fill="#555">출처 태그 달아서 통합</text>
  <text x="440" y="336" text-anchor="middle" font-size="12.5" fill="#555">예: [수학] [영어] [집]</text>
  <text x="440" y="354" text-anchor="middle" font-size="11" fill="#999">총 5개 과제</text>

  <!-- 2단계 보상 박스 -->
  <text x="610" y="200" font-size="17" font-weight="700" fill="#555">② 과제를 처리하면 → 2단계로 보상</text>

  <!-- 1단계 -->
  <rect x="610" y="216" width="480" height="150" rx="16" fill="#fbfff0" stroke="#70A02E" stroke-width="2"/>
  <text x="632" y="246" font-size="15" font-weight="800" fill="#3d5618">1단계 · 중간 휴식 (감질나게 짧게)</text>
  <text x="632" y="272" font-size="13" fill="#5a7035">과제 1개 완료할 때마다 → <tspan font-weight="700">5~10분 적립</tspan></text>
  <text x="632" y="296" font-size="13" fill="#5a7035">"숨 돌리기"용. 친구 연락하거나 잠깐 쉬는 용도.</text>
  <line x1="632" y1="312" x2="1068" y2="312" stroke="#dfe9c8" stroke-width="1.2"/>
  <text x="632" y="334" font-size="12.5" fill="#7a8c5a">▸ 당겨쓰거나 / 모아두거나 — <tspan font-weight="700" fill="#5a7035">아이가 선택</tspan></text>
  <text x="632" y="354" font-size="12.5" fill="#7a8c5a">▸ 짧게 줘야 "풀타임 받으려면 다 끝내자"는 동기가 생김</text>

  <!-- 2단계 -->
  <rect x="610" y="384" width="480" height="124" rx="16" fill="#f0fff4" stroke="#2EB652" stroke-width="2.5"/>
  <text x="632" y="414" font-size="15" font-weight="800" fill="#1a6b32">2단계 · 최종 보상 (진짜 목표) 🏁</text>
  <text x="632" y="440" font-size="13" fill="#2a5a3a">그날 <tspan font-weight="700">모든 학원의 모든 과제</tspan> 완료 시</text>
  <text x="632" y="464" font-size="13" fill="#2a5a3a">→ <tspan font-weight="700">학부모가 정한 시간까지 쭉 개방</tspan></text>
  <text x="632" y="490" font-size="12" fill="#5a8c6a">그날 한정 (이월 안 됨) · 휴식 지갑과는 별개로 작동</text>

  <!-- 휴식 지갑 -->
  <text x="70" y="470" font-size="17" font-weight="700" fill="#555">③ 휴식 지갑 — 저축 가능한 통장</text>

  <rect x="70" y="486" width="465" height="200" rx="16" fill="#FFFBEF" stroke="#E0A030" stroke-width="2"/>
  <text x="92" y="516" font-size="16" font-weight="800" fill="#8a6010">🍪 휴식 지갑</text>
  <text x="300" y="516" font-size="26" font-weight="800" fill="#B0892E" text-anchor="middle">18분</text>
  <text x="430" y="516" font-size="12" fill="#9a8050">현재 적립액</text>
  <line x1="92" y1="530" x2="513" y2="530" stroke="#f0e2c0" stroke-width="1.2"/>

  <text x="92" y="556" font-size="13" fill="#6b5a30">▸ 안 쓰면 <tspan font-weight="700">다음날로 이월</tspan> (진짜 저축)</text>
  <text x="92" y="580" font-size="13" fill="#6b5a30">▸ 시험기간엔 모아뒀다 <tspan font-weight="700">몰아쓰기</tspan> 가능</text>
  <text x="92" y="604" font-size="13" fill="#6b5a30">▸ 필요할 땐 밤새 공부 후 한 번에 사용</text>
  <line x1="92" y1="620" x2="513" y2="620" stroke="#f0e2c0" stroke-width="1.2"/>
  <text x="92" y="644" font-size="13" fill="#8a6010" font-weight="700">⚙ 저축 한도 — 학부모가 설정</text>
  <text x="92" y="666" font-size="12" fill="#9a8050">기본값 예: 120분 · 무한 누적으로 하루종일 폰 하는 것 방지</text>

  <!-- 선택 분기 -->
  <text x="610" y="556" font-size="15" font-weight="700" fill="#555">아이의 매일의 선택</text>
  <rect x="610" y="572" width="230" height="114" rx="14" fill="#fff" stroke="#70A02E" stroke-width="1.8"/>
  <text x="725" y="600" text-anchor="middle" font-size="14" font-weight="700" fill="#3d5618">🐰 지금 당겨쓰기</text>
  <text x="725" y="624" text-anchor="middle" font-size="12" fill="#5a7035">친구 연락 · 잠깐 휴식</text>
  <text x="725" y="646" text-anchor="middle" font-size="12" fill="#5a7035">바로 충전 회복</text>
  <text x="725" y="670" text-anchor="middle" font-size="11" fill="#9aa67a">→ 그만큼 지갑 차감</text>

  <rect x="860" y="572" width="230" height="114" rx="14" fill="#fff" stroke="#2EB652" stroke-width="1.8"/>
  <text x="975" y="600" text-anchor="middle" font-size="14" font-weight="700" fill="#1a6b32">🐢 참고 모아두기</text>
  <text x="975" y="624" text-anchor="middle" font-size="12" fill="#2a5a3a">계속 미션 진행</text>
  <text x="975" y="646" text-anchor="middle" font-size="12" fill="#2a5a3a">지갑에 차곡차곡</text>
  <text x="975" y="670" text-anchor="middle" font-size="11" fill="#7a9a86">→ 자기조절 훈련 ★</text>

  <!-- 흐름 정리 -->
  <line x1="70" y1="720" x2="1090" y2="720" stroke="#e3e3e3" stroke-width="1.5"/>
  <text x="70" y="756" font-size="17" font-weight="700" fill="#555">④ 하루 전체 흐름</text>

  <g font-size="12.5">
    <rect x="70" y="774" width="180" height="62" rx="11" fill="#E8F0D5" stroke="#70A02E" stroke-width="1.6"/>
    <text x="160" y="800" text-anchor="middle" font-weight="700" fill="#3d5618">과제 하나 완료</text>
    <text x="160" y="820" text-anchor="middle" fill="#5a7035">+5~10분 지갑 적립</text>

    <rect x="290" y="774" width="180" height="62" rx="11" fill="#FFFBEF" stroke="#E0A030" stroke-width="1.6"/>
    <text x="380" y="800" text-anchor="middle" font-weight="700" fill="#8a6010">쓸까 모을까 선택</text>
    <text x="380" y="820" text-anchor="middle" fill="#9a8050">아이가 결정</text>

    <rect x="510" y="774" width="180" height="62" rx="11" fill="#E8F0D5" stroke="#70A02E" stroke-width="1.6"/>
    <text x="600" y="800" text-anchor="middle" font-weight="700" fill="#3d5618">남은 과제 반복</text>
    <text x="600" y="820" text-anchor="middle" fill="#5a7035">전부 끝낼 때까지</text>

    <rect x="730" y="774" width="180" height="62" rx="11" fill="#C8E6C9" stroke="#2EB652" stroke-width="2"/>
    <text x="820" y="800" text-anchor="middle" font-weight="700" fill="#1a6b32">전체 완료! 🏁</text>
    <text x="820" y="820" text-anchor="middle" fill="#2a5a3a">최종 보상 개방</text>

    <rect x="950" y="774" width="140" height="62" rx="11" fill="#D5E8F0" stroke="#2E75B6" stroke-width="1.6"/>
    <text x="1020" y="800" text-anchor="middle" font-weight="700" fill="#1a4566">부모님 알림</text>
    <text x="1020" y="820" text-anchor="middle" fill="#5a7488">"통과했어요"</text>
  </g>
  <line x1="250" y1="805" x2="288" y2="805" stroke="#888" stroke-width="1.6" marker-end="url(#d)"/>
  <line x1="470" y1="805" x2="508" y2="805" stroke="#888" stroke-width="1.6" marker-end="url(#d)"/>
  <line x1="690" y1="805" x2="728" y2="805" stroke="#888" stroke-width="1.6" marker-end="url(#d)"/>
  <line x1="910" y1="805" x2="948" y2="805" stroke="#888" stroke-width="1.6" marker-end="url(#d)"/>
  <!-- loop back -->
  <path d="M600 836 Q600 866 380 866 Q160 866 160 838" fill="none" stroke="#B0892E" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#d)"/>
  <text x="380" y="884" text-anchor="middle" font-size="11" fill="#B0892E" font-style="italic">다음 과제로 반복</text>

  <!-- summary table -->
  <line x1="70" y1="910" x2="1090" y2="910" stroke="#2E75B6" stroke-width="2"/>
  <text x="70" y="944" font-size="16" font-weight="700" fill="#2E75B6">요약 — 두 보상은 완전히 별개로 작동</text>

  <rect x="70" y="962" width="1020" height="150" rx="12" fill="#fafafa" stroke="#ccc" stroke-width="1.5"/>
  <line x1="580" y1="978" x2="580" y2="1096" stroke="#e0e0e0" stroke-width="1.5"/>

  <text x="96" y="998" font-size="14" font-weight="800" fill="#8a6010">🍪 휴식 지갑 (1단계)</text>
  <text x="96" y="1024" font-size="12.5" fill="#555">· 과제당 5~10분 적립</text>
  <text x="96" y="1046" font-size="12.5" fill="#555">· 저축·이월 가능 (한도는 학부모 설정)</text>
  <text x="96" y="1068" font-size="12.5" fill="#555">· 아이가 쓰는 타이밍 선택 → 자기조절 훈련</text>
  <text x="96" y="1090" font-size="12.5" fill="#555">· 성격: 자유롭게 굴러가는 윤활유</text>

  <text x="606" y="998" font-size="14" font-weight="800" fill="#1a6b32">🏁 최종 보상 (2단계)</text>
  <text x="606" y="1024" font-size="12.5" fill="#555">· 그날 전체 과제 완료 시 개방</text>
  <text x="606" y="1046" font-size="12.5" fill="#555">· 학부모가 정한 시간만큼</text>
  <text x="606" y="1068" font-size="12.5" fill="#555">· 그날 한정 (이월 없음)</text>
  <text x="606" y="1090" font-size="12.5" fill="#555">· 성격: 하루의 진짜 목표</text>

  <text x="580" y="1148" text-anchor="middle" font-size="12" fill="#888">UnoLock (가칭) · 보상 체계 다이어그램 v1 · 함께 수정해 나갑니다</text>
</svg>
